[options]
admin_passwd = admin
list_db = False

; ENV variables cannot be read from this file, using docker-compose.yml file instead.
; This is the password that allows database operations:
;admin_passwd = admin
; Configuración de base de datos(en docker-compose.yml)
; db_user = ${POSTGRES_USER}
; db_password = ${POSTGRES_PASSWORD}
; db_name = postgres
; db_port = 5432


addons_path = /usr/lib/python3/dist-packages/odoo/addons

proxy_mode = True

; Live chat config with more than one worker:
;gevent_port = 8072
;longpolling_port = False
;websocket_port = 8072

; Email configuration (configure for production)
; email_from = noreply@yourdomain.com
; smtp_server = localhost
; smtp_port = 25
; smtp_user = 
; smtp_password = 
; smtp_ssl = False

; File upload settings
; limit_memory_hard = 2684354560  ; 2.5GB
; limit_memory_soft = 2147483648  ; 2GB
; limit_request = 8192
; limit_time_cpu = 600
; limit_time_real = 1200
; limit_time_real_cron = -1

; Configuración de logs
log_level = info
log_handler = :INFO

workers = 4

; List database manager on (/web/databases/manager)
; Comment db_name to see all databases, list_db = False to deactivate manager
;db_name = postgres
db_name = modista