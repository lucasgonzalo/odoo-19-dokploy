services:
  odoo-prod:
    image: odoo:19.0
    command: odoo --no-database-list --db-filter=^%d$
    depends_on:
      database:
        condition: service_healthy
    environment:
      - HOST=database
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
      - ODOO_MASTER_PASSWORD=${ODOO_MASTER_PASSWORD}
      #- MASTER_PASSWORD=${ODOO_MASTER_PASSWORD}
      - DB_NAME=${POSTGRES_DB} # comment and uncomment to see all databases

    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8069/web/health\").getcode() == 200'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  odoo-web-data:
  postgres-data:

networks:
  dokploy-network:
    external: true